name: Daily Port Report

on:
  schedule:
    # 每天 UTC 00:00 = 新加坡时间 08:00
    - cron: "0 0 * * *"

  workflow_dispatch:

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show current time
        run: date

      - name: Hello
        run: echo "Port Daily Agent Running!"