name: Daily Port Report

on:
  schedule:
    - cron: "0 0 * * *"   # UTC 0:00 = Beijing 8:00

  workflow_dispatch:       # Manual trigger

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Run Daily Port Broadcast
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UID: ${{ secrets.WXPUSHER_UID }}
        run: |
          python main.py

      - name: Upload daily report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Commit reports back to repo
        if: always()
        run: |
          git config user.name "Daily Port Bot"
          git config user.email "bot@daily-port.local"
          git add reports/ *.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Daily report $(date +%Y-%m-%d)"
          git push || echo "Push skipped (no changes or permission)"
